<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="منصة AcademiaHub - منصتك الأكاديمية المتكاملة لخدمات البحث العلمي">
    <meta name="keywords" content="رسائل ماجستير, دكتوراه, أبحاث علمية, ترجمة أكاديمية, نشر علمي">
    <title>AcademiaHub | تسجيل الدخول</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&family=El+Messiri:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    
    <!-- ═══════════════ خلفية متحركة ═══════════════ -->
    <div class="auth-background">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>
        <div class="bg-shape shape-4"></div>
        <div class="bg-particles" id="bgParticles"></div>
    </div>

    <!-- ═══════════════ حاوية تسجيل الدخول ═══════════════ -->
    <div class="auth-container">
        
        <!-- الشعار والترحيب -->
        <div class="auth-header" data-aos="fade-down" data-aos-duration="800">
            <div class="auth-logo">
                <div class="logo-animation">
                    <i class="fa-solid fa-graduation-cap logo-cap"></i>
                    <i class="fa-solid fa-book-open logo-book"></i>
                    <i class="fa-solid fa-pen-fancy logo-pen"></i>
                </div>
                <h1 class="logo-name">Academia<span>Hub</span></h1>
                <p class="logo-tagline">منصتك الأكاديمية المتكاملة</p>
            </div>
        </div>

        <!-- شريط العبارات الترحيبية المتحرك -->
        <div class="welcome-marquee" data-aos="fade-up" data-aos-duration="800">
            <div class="marquee-track">
                <span><i class="fa-solid fa-shield-halved"></i> ثقة</span>
                <span class="dot">•</span>
                <span><i class="fa-solid fa-handshake"></i> أمانة</span>
                <span class="dot">•</span>
                <span><i class="fa-solid fa-lock"></i> سرية تامة</span>
                <span class="dot">•</span>
                <span><i class="fa-solid fa-rocket"></i> إنجاز</span>
                <span class="dot">•</span>
                <span><i class="fa-solid fa-bullseye"></i> دقة</span>
                <span class="dot">•</span>
                <span><i class="fa-solid fa-star"></i> جودة</span>
                <span class="dot">•</span>
                <span><i class="fa-solid fa-clock"></i> التزام</span>
                <span class="dot">•</span>
                <span><i class="fa-solid fa-medal"></i> خبرة</span>
                <!-- تكرار للحركة المستمرة -->
                <span><i class="fa-solid fa-shield-halved"></i> ثقة</span>
                <span class="dot">•</span>
                <span><i class="fa-solid fa-handshake"></i> أمانة</span>
                <span class="dot">•</span>
                <span><i class="fa-solid fa-lock"></i> سرية تامة</span>
                <span class="dot">•</span>
                <span><i class="fa-solid fa-rocket"></i> إنجاز</span>
            </div>
        </div>

        <!-- نموذج التسجيل والدخول -->
        <div class="auth-card" data-aos="zoom-in" data-aos-duration="1000" data-aos-delay="200">
            
            <!-- أزرار التبديل -->
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">
                    <i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول
                </button>
                <button class="auth-tab" data-tab="register">
                    <i class="fa-solid fa-user-plus"></i> حساب جديد
                </button>
            </div>

            <!-- نموذج تسجيل الدخول -->
            <form class="auth-form active" id="loginForm">
                <div class="form-icon-field">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" placeholder="البريد الإلكتروني" required id="loginEmail">
                </div>
                <div class="form-icon-field">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="كلمة المرور" required id="loginPassword">
                    <button type="button" class="toggle-password" tabindex="-1">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> تذكرني
                    </label>
                    <a href="#" class="forgot-link">نسيت كلمة المرور؟</a>
                </div>
                <button type="submit" class="btn-auth">
                    <span>دخول</span>
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
            </form>

            <!-- نموذج التسجيل -->
            <form class="auth-form" id="registerForm">
                <div class="form-row-dual">
                    <div class="form-icon-field">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="الاسم الأول" required id="firstName">
                    </div>
                    <div class="form-icon-field">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="الاسم الأخير" required id="lastName">
                    </div>
                </div>
                <div class="form-icon-field">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" placeholder="البريد الإلكتروني" required id="registerEmail">
                </div>
                <div class="form-icon-field">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <select required id="academicLevel">
                        <option value="">المستوى الأكاديمي</option>
                        <option value="bachelor">بكالوريوس</option>
                        <option value="master">ماجستير</option>
                        <option value="phd">دكتوراه</option>
                        <option value="researcher">باحث</option>
                    </select>
                </div>
                <div class="form-icon-field">
                    <i class="fa-solid fa-bookmark"></i>
                    <select required id="specialization">
                        <option value="">التخصص العام</option>
                        <option value="medical">الطب والعلوم الصحية</option>
                        <option value="engineering">الهندسة</option>
                        <option value="science">العلوم الطبيعية</option>
                        <option value="social">العلوم الاجتماعية</option>
                        <option value="humanities">العلوم الإنسانية</option>
                        <option value="business">الإدارة والاقتصاد</option>
                        <option value="law">القانون</option>
                    </select>
                </div>
                <div class="form-icon-field">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="كلمة المرور" required id="registerPassword">
                </div>
                <div class="form-icon-field">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="تأكيد كلمة المرور" required id="confirmPassword">
                </div>
                <div class="terms-agreement">
                    <input type="checkbox" required id="agreeTerms">
                    <label for="agreeTerms">أوافق على <a href="#">الشروط والأحكام</a> و <a href="#">سياسة الخصوصية</a></label>
                </div>
                <button type="submit" class="btn-auth">
                    <span>إنشاء حساب</span>
                    <i class="fa-solid fa-user-plus"></i>
                </button>
            </form>

            <!-- رسائل الخطأ -->
            <div class="auth-message" id="authMessage"></div>
        </div>

        <!-- تذييل -->
        <div class="auth-footer" data-aos="fade-up" data-aos-duration="800" data-aos-delay="400">
            <p>© 2024 AcademiaHub. جميع الحقوق محفوظة.</p>
            <div class="auth-footer-links">
                <a href="#">سياسة الخصوصية</a>
                <span>|</span>
                <a href="#">الشروط والأحكام</a>
                <span>|</span>
                <a href="#">اتصل بنا</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
